# Infrastructure Provisioning
#
# Triggers:
#   - Pull request targeting main (infra/ changes) → deploys to dev for testing
#   - Push to main (infra/ changes, i.e. PR merged)  → deploys to prod
#   - Manual workflow_dispatch with environment choice
#
# Authentication: OIDC / Workload Identity Federation — no stored Azure credentials.
# Required GitHub secrets: AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#
# Azure federated identity credentials required on the App Registration:
#   Subject: repo:sanuja-ariyapperuma/PromptBank:ref:refs/heads/main  (push + workflow_dispatch)
#   Subject: repo:sanuja-ariyapperuma/PromptBank:pull_request          (PR-based dev deploys)

name: Infrastructure Provisioning

on:
  pull_request:
    branches: [main]
    paths: ['infra/**']
  push:
    branches: [main]
    paths: ['infra/**']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write   # Required for OIDC token exchange
  contents: read

jobs:
  provision-dev:
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')
    runs-on: ubuntu-latest
    # Note: no GitHub 'environment:' here — using it would change the OIDC subject
    # to 'environment:dev', which does not match the branch-based federated credential
    # configured in Azure (ref:refs/heads/main / pull_request).
    env:
      ENVIRONMENT: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate Bicep
        run: az bicep build --file infra/main.bicep

      - name: Deploy infrastructure
        run: |
          az deployment group create \
            --resource-group "rg-promptbank-${ENVIRONMENT}" \
            --template-file infra/main.bicep \
            --parameters "infra/parameters/${ENVIRONMENT}.bicepparam"

  provision-prod:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod')
    runs-on: ubuntu-latest
    # Note: no GitHub 'environment:' here — same OIDC subject reason as provision-dev.
    env:
      ENVIRONMENT: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate Bicep
        run: az bicep build --file infra/main.bicep

      - name: Deploy infrastructure
        run: |
          az deployment group create \
            --resource-group "rg-promptbank-${ENVIRONMENT}" \
            --template-file infra/main.bicep \
            --parameters "infra/parameters/${ENVIRONMENT}.bicepparam"
