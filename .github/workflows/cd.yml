# Continuous Deployment
#
# Triggers:
#   - Successful completion of the CI workflow (workflow_run event)
#     - CI triggered by pull_request → deploys to dev
#     - CI triggered by push to main  → deploys to prod (requires reviewer approval)
#
# Authentication: OIDC / Workload Identity Federation — no stored Azure credentials.
# Required GitHub secrets: AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID

name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  id-token: write   # OIDC token exchange
  contents: read
  actions: read     # Required to download artifacts from the CI workflow run

jobs:
  deploy-dev:
    name: Deploy to dev
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    environment: dev
    env:
      ENVIRONMENT: dev

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: promptbank-app
          path: ./publish
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Zip artifact for deployment
        run: cd ./publish && zip -r ../app.zip .

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure App Service
        run: |
          az webapp deploy \
            --name app-promptbank-${ENVIRONMENT} \
            --resource-group rg-promptbank-${ENVIRONMENT} \
            --type zip \
            --src-path app.zip

  deploy-prod:
    name: Deploy to prod
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    environment: prod
    env:
      ENVIRONMENT: prod

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: promptbank-app
          path: ./publish
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Zip artifact for deployment
        run: cd ./publish && zip -r ../app.zip .

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure App Service
        run: |
          az webapp deploy \
            --name app-promptbank-${ENVIRONMENT} \
            --resource-group rg-promptbank-${ENVIRONMENT} \
            --type zip \
            --src-path app.zip
